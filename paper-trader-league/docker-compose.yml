x-python-service: &python-service
  image: python:3.12-slim
  restart: unless-stopped
  working_dir: /app
  env_file:
    - .env
  depends_on:
    timescaledb:
      condition: service_healthy

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ptl-timescaledb
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./infra/timescaledb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana:latest
    container_name: ptl-grafana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      timescaledb:
        condition: service_healthy

  data_ingest:
    <<: *python-service
    container_name: ptl-data-ingest
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python src/main.py"
    volumes:
      - ./services/data_ingest:/app
    environment:
      DEFAULT_SEASON_ID: "season-004"
      AUTO_BOOTSTRAP_SEASON: "true"
      DEFAULT_STARTING_BTC: "0.05"

  trade_engine:
    <<: *python-service
    container_name: ptl-trade-engine
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8088"
    volumes:
      - ./services/trade_engine:/app
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  scoring_api:
    <<: *python-service
    container_name: ptl-scoring-api
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8090"
    volumes:
      - ./services/scoring_api:/app
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  data_ingest_s3:
    <<: *python-service
    container_name: ptl-data-ingest-s3
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python src/main.py"
    volumes:
      - ./services/data_ingest_s3:/app
    environment:
      DEFAULT_SEASON_ID: "season-003"
      AUTO_BOOTSTRAP_SEASON: "true"
      DEFAULT_STARTING_BTC: "0.05"

  bot_executor:
    <<: *python-service
    container_name: ptl-bot-executor
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python ${BOT_EXECUTOR_ENTRYPOINT:-src/main.py}"
    volumes:
      - ./services/bot_executor:/app
      - ./bots/bot_strategies.json:/app/src/bot_strategies.json
    environment:
      SEASON_ID: "season-004"
      TRADE_ENGINE_URL: "http://ptl-trade-engine:8088"
    depends_on:
      trade_engine:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
  grafana_data:
