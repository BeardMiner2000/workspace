<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Trader League - Master Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.8;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .stat-label {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
    }

    .stat-subtext {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 5px;
    }

    .season-section {
      margin-bottom: 40px;
    }

    .season-title {
      font-size: 1.5rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .season-2 .season-title { border-color: #FF6B6B; }
    .season-2 .stat-value { color: #FF6B6B; }
    .season-3 .season-title { border-color: #4ECDC4; }
    .season-3 .stat-value { color: #4ECDC4; }
    .season-4 .season-title { border-color: #FFD93D; }
    .season-4 .stat-value { color: #FFD93D; }

    .season-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .bot-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      font-size: 0.9rem;
    }

    .bot-name {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .bot-stat {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      opacity: 0.8;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .chart-card {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .chart-title {
      font-size: 1.1rem;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
    }

    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #FF6B6B;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      color: #FFB3B3;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .charts {
        grid-template-columns: 1fr;
      }
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0.6;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Paper Trader League</h1>
      <p class="subtitle">Master Summary Dashboard</p>
    </header>

    <div id="content">
      <div class="loading">Loading dashboard...</div>
    </div>

    <div class="footer">
      <p>Powered by Grafana + TimescaleDB | Real-time trading metrics</p>
      <p style="margin-top: 10px;">Last updated: <span id="lastUpdate">--:--:--</span></p>
    </div>
  </div>

  <script>
    const GRAFANA_URL = window.location.protocol + '//' + window.location.host + '/grafana';
    const REFRESH_INTERVAL = 30000; // 30 seconds

    async function loadDashboard() {
      try {
        // This will embed Grafana dashboard via iframe if available
        const content = document.getElementById('content');
        
        // For now, show a message directing to Grafana directly
        content.innerHTML = `
          <div style="text-align: center; padding: 40px;">
            <p style="margin-bottom: 20px; font-size: 1.1rem;">
              View the full interactive dashboard:
            </p>
            <a href="http://localhost:3000/d/master-summary" 
               style="
                 display: inline-block;
                 padding: 12px 24px;
                 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                 color: white;
                 text-decoration: none;
                 border-radius: 8px;
                 font-weight: bold;
                 transition: transform 0.3s;
               "
               onmouseover="this.style.transform='scale(1.05)'"
               onmouseout="this.style.transform='scale(1)'">
              Open Grafana Dashboard →
            </a>
            <p style="margin-top: 30px; opacity: 0.6;">
              This public dashboard connects to Grafana running on localhost:3000<br/>
              For remote access, configure Grafana with authentication and reverse proxy.
            </p>
          </div>
        `;

        updateLastUpdate();
      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            <strong>Error loading dashboard:</strong> ${error.message}
          </div>
        `;
      }
    }

    function updateLastUpdate() {
      const now = new Date();
      document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
    }

    // Load on startup
    loadDashboard();

    // Refresh periodically
    setInterval(updateLastUpdate, REFRESH_INTERVAL);
  </script>
</body>
</html>
