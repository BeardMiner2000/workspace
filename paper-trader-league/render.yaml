services:
  - type: web
    name: paper-trader-dashboard
    runtime: node
    rootDir: public-dashboard
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    buildFilter:
      paths:
        - public-dashboard/**
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CACHE_TTL_MS
        value: 15000
      - key: HISTORY_LIMIT
        value: 240
      - key: ORDERS_LIMIT
        value: 20
