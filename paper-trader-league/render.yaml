services:
  - type: web
    name: paper-trader-scoring-api
    runtime: python
    rootDir: services/scoring_api
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/scoring_api/**
        - render.yaml
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: 5432
      - key: POSTGRES_DB
        value: paperbot
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false

  - type: web
    name: paper-trader-dashboard
    runtime: node
    rootDir: public-dashboard
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    buildFilter:
      paths:
        - public-dashboard/**
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CACHE_TTL_MS
        value: 15000
      - key: HISTORY_LIMIT
        value: 240
      - key: ORDERS_LIMIT
        value: 20
